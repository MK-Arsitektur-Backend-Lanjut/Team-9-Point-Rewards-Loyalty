services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - mysql
    healthcheck:
      test: ["CMD", "php", "-v"]
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 512m
    cpus: 0.75

  webserver:
    image: nginx:alpine
    container_name: loyalty-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    mem_limit: 256m
    cpus: 0.50

  mysql:
    image: mysql:8.0
    container_name: loyalty-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: loyalty_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: loyalty_user
      MYSQL_PASSWORD: secret
    ports:
      - "33061:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    mem_limit: 1g
    cpus: 1.00

volumes:
  mysql_data:
